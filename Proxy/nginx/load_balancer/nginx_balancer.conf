upstream php_backend {
    least_conn;

    server 10.0.0.11:80 max_fails=3 fail_timeout=30s;
    server 10.0.0.12:80 max_fails=3 fail_timeout=30s;
    server 10.0.0.13:80 max_fails=3 fail_timeout=30s;
    server 10.0.0.14:80 max_fails=3 fail_timeout=30s;
    server 10.0.0.15:80 max_fails=3 fail_timeout=30s;

    keepalive 32;
}

server {
    listen 80;
    server_name app.triniti.com;

    access_log /var/log/nginx/lb_access.log;
    error_log  /var/log/nginx/lb_error.log;

    location / {
        proxy_pass http://php_backend;

        proxy_http_version 1.1;
        proxy_set_header Connection "";

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 5s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
}